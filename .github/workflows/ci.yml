name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Mr5-School-API-main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Mr5-School-API-main/package-lock.json
      - run: npm ci
      - run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-for-ci-only
          MONGO_URI: mongodb://127.0.0.1:27017/mr5-test

  client-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client-main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client-main/package-lock.json
      - run: npm ci
      - run: npm test -- --passWithNoTests
      - run: npm run lint

  client-e2e:
    runs-on: ubuntu-latest
    needs: [api-tests]
    defaults:
      run:
        working-directory: client-main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client-main/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test e2e/smoke.spec.ts
        env:
          CI: true

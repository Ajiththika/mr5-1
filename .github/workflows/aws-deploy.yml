# GitHub → Build → Test → Package → AWS Deploy

name: AWS Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: API tests
        working-directory: Mr5-School-API-main
        run: npm ci && npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-for-ci-only-min-32-chars
          MONGO_URI: mongodb://127.0.0.1:27017/mr5-test

      - name: Client tests, lint, build
        working-directory: client-main
        run: npm ci && npm test -- --passWithNoTests && npm run lint && npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.example.com
          NEXT_PUBLIC_SITE_URL: https://app.example.com

  build-push-api:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - name: Build and push API
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPO: ${{ secrets.ECR_REPOSITORY_API }}
          TAG: ${{ github.sha }}
        run: |
          docker build -t "${REGISTRY}/${REPO}:${TAG}" -t "${REGISTRY}/${REPO}:latest" ./Mr5-School-API-main
          docker push "${REGISTRY}/${REPO}:${TAG}"
          docker push "${REGISTRY}/${REPO}:latest"

  build-push-web:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - name: Build and push Web
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPO: ${{ secrets.ECR_REPOSITORY_WEB }}
          TAG: ${{ github.sha }}
          API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="${API_URL:-https://api.example.com}" \
            --build-arg NEXT_PUBLIC_SITE_URL="${SITE_URL:-https://app.example.com}" \
            -t "${REGISTRY}/${REPO}:${TAG}" -t "${REGISTRY}/${REPO}:latest" ./client-main
          docker push "${REGISTRY}/${REPO}:${TAG}"
          docker push "${REGISTRY}/${REPO}:latest"

  deploy:
    needs: [build-push-api, build-push-web]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Roll ECS services
        run: |
          aws ecs update-service \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --service "${{ secrets.ECS_SERVICE_API }}" \
            --force-new-deployment \
            --no-cli-pager
          aws ecs update-service \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --service "${{ secrets.ECS_SERVICE_WEB }}" \
            --force-new-deployment \
            --no-cli-pager
          aws ecs wait services-stable \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --services "${{ secrets.ECS_SERVICE_API }}" "${{ secrets.ECS_SERVICE_WEB }}"

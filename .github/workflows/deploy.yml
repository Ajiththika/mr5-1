# MR5 School — Production Deploy Pipeline

name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  security-events: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  secret-scan
  # ---------------------------------------------------------------------------
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Block .env files in diff
        run: |
          if git diff --name-only origin/main...HEAD 2>/dev/null | grep -E '(^|/)\.env(\.|$)' | grep -v '\.example'; then
            echo "::error::Committed .env file detected. Use .env.example only."
            exit 1
          fi

  # ---------------------------------------------------------------------------
  lint-and-test
  # ---------------------------------------------------------------------------
  lint-and-test:
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            Mr5-School-API-main/package-lock.json
            client-main/package-lock.json

      - name: API — install, lint, audit, test
        working-directory: Mr5-School-API-main
        run: |
          npm ci
          npm run lint
          npm audit --audit-level=high || true
          npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-for-ci-only-min-32-chars
          MONGO_URI: mongodb://127.0.0.1:27017/mr5-test

      - name: Web — install, lint, audit, test
        working-directory: client-main
        run: |
          npm ci
          npm run lint
          npm audit --audit-level=high || true
          npm test -- --passWithNoTests

      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4

  # ---------------------------------------------------------------------------
  build-web
  # ---------------------------------------------------------------------------
  build-web:
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client-main/package-lock.json

      - name: Production build
        working-directory: client-main
        run: npm ci && npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://api.mr5school.com' }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://app.mr5school.com' }}

  # ---------------------------------------------------------------------------
  docker-build-scan
  # ---------------------------------------------------------------------------
  docker-build-scan:
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        include:
          - service: api
            context: ./Mr5-School-API-main
            image: mr5-api
          - service: web
            context: ./client-main
            image: mr5-web
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="${{ vars.NEXT_PUBLIC_API_URL || 'https://api.mr5school.com' }}" \
            --build-arg NEXT_PUBLIC_SITE_URL="${{ vars.NEXT_PUBLIC_SITE_URL || 'https://app.mr5school.com' }}" \
            -t "mr5-${{ matrix.service }}:${{ github.sha }}" \
            "${{ matrix.context }}"

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "mr5-${{ matrix.service }}:${{ github.sha }}"
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

  # ---------------------------------------------------------------------------
  deploy-aws (main only)
  # ---------------------------------------------------------------------------
  deploy-aws:
    runs-on: ubuntu-latest
    needs: [docker-build-scan, build-web]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Build, push, deploy API
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPO: ${{ secrets.ECR_REPOSITORY_API || 'mr5-api' }}
          TAG: ${{ github.sha }}
        run: |
          docker build -t "${REGISTRY}/${REPO}:${TAG}" -t "${REGISTRY}/${REPO}:latest" ./Mr5-School-API-main
          docker push "${REGISTRY}/${REPO}:${TAG}"
          docker push "${REGISTRY}/${REPO}:latest"
          aws ecs update-service \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --service "${{ secrets.ECS_SERVICE_API }}" \
            --force-new-deployment \
            --no-cli-pager

      - name: Build, push, deploy Web (ECS option)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPO: ${{ secrets.ECR_REPOSITORY_WEB || 'mr5-web' }}
          TAG: ${{ github.sha }}
          API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="${API_URL:-https://api.mr5school.com}" \
            --build-arg NEXT_PUBLIC_SITE_URL="${SITE_URL:-https://app.mr5school.com}" \
            -t "${REGISTRY}/${REPO}:${TAG}" -t "${REGISTRY}/${REPO}:latest" ./client-main
          docker push "${REGISTRY}/${REPO}:${TAG}"
          docker push "${REGISTRY}/${REPO}:latest"
          aws ecs update-service \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --service "${{ secrets.ECS_SERVICE_WEB }}" \
            --force-new-deployment \
            --no-cli-pager

      - name: Wait for ECS stability
        run: |
          aws ecs wait services-stable \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --services "${{ secrets.ECS_SERVICE_API }}" "${{ secrets.ECS_SERVICE_WEB }}"

      - name: CloudFront invalidation
        if: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/assets/*" "/models/*" "/images/*"

  # ---------------------------------------------------------------------------
  deploy-summary
  # ---------------------------------------------------------------------------
  deploy-summary:
    runs-on: ubuntu-latest
    needs: [secret-scan, lint-and-test, build-web]
    if: always()
    steps:
      - name: Pipeline summary
        run: |
          echo "## MR5 School Deploy Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Secret scan | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & test | ${{ needs.lint-and-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web build | ${{ needs.build-web.result }} |" >> $GITHUB_STEP_SUMMARY
